<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Погодное приложение | Стильный прогноз</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-app">
        <div class="app-header">
            <h1><i class="fas fa-cloud-sun"></i> WeatherReport</h1>
            <p>Узнайте погоду в любой точке мира</p>
        </div>

        <div class="search-section">
            <input type="text" id="cityInput" class="search-input" placeholder="Введите город, например: Москва, London, Tokyo" value="London">
            <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i> Найти</button>
        </div>

        <div id="weatherCard" class="weather-card">
            <div id="tempIndicator" class="temp-indicator"></div>
            
            <div class="temp-main">
                <div class="temp-value" id="tempValue">-- <span>°C</span></div>
                <div class="weather-icon" id="weatherIcon"><i class="fas fa-question"></i></div>
            </div>

            <div class="city-name" id="cityName">
                <span>--</span>
                <span class="country-code" id="countryCode">--</span>
            </div>
            <div id="coordsInfo" style="font-size: 0.8rem; color: #3a5c6e; margin-top: 4px;">
                <i class="fas fa-map-marker-alt"></i> <span id="latLon">широта, долгота</span>
            </div>

            <div class="extra-details">
                <div class="detail-item">
                    <i class="fas fa-tint"></i>
                    <div class="detail-label">Влажность</div>
                    <div class="detail-value" id="humidity">-- %</div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-thermometer-half"></i>
                    <div class="detail-label">Ощущается как</div>
                    <div class="detail-value" id="feelsLike">-- °C</div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-wind"></i>
                    <div class="detail-label">Ветер</div>
                    <div class="detail-value" id="windSpeed">-- м/с</div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-clock"></i>
                    <div class="detail-label">Обновлено</div>
                    <div class="detail-value" id="updateTime">--:--</div>
                </div>
            </div>
        </div>
        
        <div id="errorBlock" class="error-message hidden"></div>
        <div class="footer-note">
            <i class="fas fa-cloud-moon"></i> Данные от OpenWeatherMap 
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
